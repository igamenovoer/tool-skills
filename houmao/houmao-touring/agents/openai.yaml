interface:
  display_name: "Houmao Touring"
  short_description: "Guide users not yet familiar with Houmao through fast path use cases or subsystem exploration."
  default_prompt: "Use $houmao-touring only when the user explicitly asks for the guided Houmao tour experience. If the user invokes bare $houmao-touring, scan for existing Houmao project state first, infer the likely starting intent from that state, introduce Houmao in context, and present current posture, likely intent, next choices, and required input. If no Houmao project overlay exists, show only three no-prompt choices: Create Houmao Project, Subsystem Exploration, and Inspect; do not show fast paths until a project overlay exists. If a project overlay exists, include Subsystem Exploration by name as a visible no-prompt choice alongside the guessed path and inspect-first option. Do not respond with only a generic skill-activation acknowledgement or an empty how-can-I-help greeting. Route concrete project, mailbox, credential, agent-definition, messaging, gateway, email, memory, loop, workspace, inspection, or lifecycle work to the maintained owning skill."
